<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ab4d.SharpEngine.Samples.BlazorWebAssembly</title>

    <!-- Base href values are based on the scenario: -->
    <!-- - For deploying to a subfolder: "/sharp-engine-browser-demo/" -->
    <!-- - For running in Electron app: "./"  -->
    <!-- - For running as Blazor WebAssembly: "/"  Note that this is changed in the "start-electron-app" script. -->
    <!--   If in Blazor app this is changed to "./" then internal app links will work, but pasting a url to the browser will not work anymore -->
    <base href="/" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Ab4d.SharpEngine.Samples.BlazorWebAssembly.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="256x256" href="ab4d-logo-256.png" />
</head>

<body>
    <style>
        html, body, #app {
            height: 100%;
            margin: 0;
        }
    </style>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%"/>
            <circle r="40%" cx="50%" cy="50%"/>
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred. Check console logs in Development Tools for more info.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
